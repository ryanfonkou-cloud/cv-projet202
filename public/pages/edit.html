<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modifier le CV</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <nav class="navbar">
    <span class="navbar-logo">CV<span>·</span>Profil</span>
    <span class="navbar-tag">Group 8 &nbsp;·&nbsp; ICT202</span>
  </nav>

  <div class="edit-header">
    <a href="../index.html" class="btn-back-link">← Retour</a>
    <h1>Modifier le CV</h1>
  </div>

  <div class="form-container">
    <div class="form-section">
      <h2>Informations personnelles</h2>
      <div class="form-group"><label>Nom complet *</label><input type="text" id="name" /></div>
      <div class="form-row">
        <div class="form-group"><label>Rôle</label><input type="text" id="role" /></div>
        <div class="form-group"><label>Spécialité</label><input type="text" id="specialty" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Ville</label><input type="text" id="city" /></div>
        <div class="form-group"><label>Téléphone</label><input type="text" id="phone" /></div>
      </div>
      <div class="form-group"><label>Email</label><input type="email" id="email" /></div>
      <div class="form-row">
        <div class="form-group"><label>Initiales</label><input type="text" id="initials" maxlength="3" /></div>
        <div class="form-group"><label>Couleur</label><input type="color" id="color" /></div>
      </div>
    </div>

    <div class="form-section">
      <h2>Biographie</h2>
      <div class="form-group"><label>À propos</label><textarea id="bio" rows="4"></textarea></div>
      <div class="form-group"><label>Compétences</label><input type="text" id="skills" /></div>
    </div>

    <div class="form-section">
      <h2>Parcours & Expériences</h2>
      <p style="font-size:13px;color:var(--muted);margin-bottom:20px;opacity:0.7;">Modifie chaque entrée ou ajoutes-en de nouvelles.</p>
      <div id="parcours-list"></div>
      <button class="btn-add-parcours" onclick="addParcours()">+ Ajouter une entrée</button>
    </div>

    <div class="form-section">
      <h2>Médias</h2>
      <div class="form-group"><label>Nouvelle photo (laisser vide pour garder l'ancienne)</label><input type="file" id="photo" accept="image/*" /></div>
      <div class="form-group"><label>Nouvelle vidéo</label><input type="file" id="video" accept="video/*" /></div>
      <div class="form-group"><label>Nouvel audio</label><input type="file" id="audio" accept="audio/*" /></div>
    </div>

    <div class="step-actions">
      <button class="btn-save" id="btn-update">💾 Enregistrer les modifications</button>
    </div>
    <p id="message" class="form-message"></p>
  </div>

  <div class="confirm-overlay" id="alert-overlay">
    <div class="confirm-box">
      <div class="confirm-icon">⚠️</div>
      <h2 class="confirm-title">Attention</h2>
      <p class="confirm-desc" id="alert-message">Message</p>
      <div class="confirm-actions">
        <button class="btn-confirm-delete" onclick="document.getElementById('alert-overlay').classList.remove('active')">OK</button>
      </div>
    </div>
  </div>

<script>
  var id = new URLSearchParams(window.location.search).get('id');
  var parcoursCount = 0;

  function addParcours(data) {
    parcoursCount++;
    var pid = 'parcours-' + parcoursCount;
    var div = document.createElement('div');
    div.className = 'parcours-entry';
    div.id = pid;
    div.innerHTML =
      '<div class="parcours-entry-header">' +
        '<span class="parcours-entry-num">' + parcoursCount + '</span>' +
        '<button class="parcours-remove-btn" onclick="removeParcours(\'' + pid + '\')">✕</button>' +
      '</div>' +
      '<div class="form-group"><label>Titre *</label>' +
        '<input type="text" class="p-title" placeholder="Ex : Licence en Informatique" value="' + (data&&data.title?data.title:'') + '" /></div>' +
      '<div class="form-group"><label>Institution · Période</label>' +
        '<input type="text" class="p-sub" placeholder="Ex : Université de Yaoundé 1 · 2023-2026" value="' + (data&&data.sub?data.sub:'') + '" /></div>' +
      '<div class="form-group"><label>Description</label>' +
        '<textarea class="p-desc" rows="3">' + (data&&data.desc?data.desc:'') + '</textarea></div>';
    document.getElementById('parcours-list').appendChild(div);
  }

  function removeParcours(id) { var el=document.getElementById(id); if(el) el.remove(); }

  function getParcours() {
    var result=[];
    document.querySelectorAll('.parcours-entry').forEach(function(e){
      var t=e.querySelector('.p-title').value.trim();
      if(t) result.push({title:t,sub:e.querySelector('.p-sub').value.trim(),desc:e.querySelector('.p-desc').value.trim()});
    });
    return JSON.stringify(result);
  }

  fetch('/api/cvs/' + id)
    .then(function(r){return r.json();})
    .then(function(cv){
      document.getElementById('name').value      = cv.name      || '';
      document.getElementById('role').value      = cv.role      || '';
      document.getElementById('specialty').value = cv.specialty || '';
      document.getElementById('city').value      = cv.city      || '';
      document.getElementById('phone').value     = cv.phone     || '';
      document.getElementById('email').value     = cv.email     || '';
      document.getElementById('initials').value  = cv.initials  || '';
      document.getElementById('color').value     = cv.color     || '#c8a96e';
      document.getElementById('bio').value       = cv.bio       || '';
      document.getElementById('skills').value    = cv.skills    || '';
      if(cv.parcours){
        try {
          var items=JSON.parse(cv.parcours);
          if(Array.isArray(items)&&items.length>0){ items.forEach(function(item){addParcours(item);}); }
          else { addParcours(); }
        } catch(e){ addParcours(); }
      } else { addParcours(); }
    });

  document.getElementById('btn-update').addEventListener('click', function(){
    var name=document.getElementById('name').value.trim();
    if(!name){
      document.getElementById('alert-message').textContent='Le nom est obligatoire !';
      document.getElementById('alert-overlay').classList.add('active');
      return;
    }
    var fd=new FormData();
    fd.append('name',name);
    fd.append('role',document.getElementById('role').value);
    fd.append('specialty',document.getElementById('specialty').value);
    fd.append('city',document.getElementById('city').value);
    fd.append('email',document.getElementById('email').value);
    fd.append('phone',document.getElementById('phone').value);
    fd.append('bio',document.getElementById('bio').value);
    fd.append('skills',document.getElementById('skills').value);
    fd.append('parcours',getParcours());
    fd.append('initials',document.getElementById('initials').value);
    fd.append('color',document.getElementById('color').value);
    var photo=document.getElementById('photo').files[0];
    var video=document.getElementById('video').files[0];
    var audio=document.getElementById('audio').files[0];
    if(photo) fd.append('photo',photo);
    if(video) fd.append('video',video);
    if(audio) fd.append('audio',audio);
    var msg=document.getElementById('message');
    msg.textContent='Enregistrement...';
    msg.style.color='var(--gold)';
    fetch('/api/cvs/'+id,{method:'PUT',body:fd})
      .then(function(r){return r.json();})
      .then(function(data){
        if(data.success){
          msg.textContent='✅ CV modifié avec succès !';
          msg.style.color='var(--green)';
          setTimeout(function(){window.location.href='../index.html';},1500);
        } else {
          msg.textContent='❌ Erreur lors de la modification.';
          msg.style.color='var(--red)';
        }
      });
  });
</script>
</body>
</html>
