<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modifier le CV</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <header style="max-width:720px;margin:0 auto;padding:30px 32px;display:flex;justify-content:space-between;align-items:center;">
    <a href="../index.html" class="btn-back-link">← Retour</a>
    <h1 style="font-family:Georgia,serif;font-size:1.3rem;">Modifier le CV</h1>
  </header>

  <div class="form-container">
    <div class="form-section">
      <h2>Informations personnelles</h2>
      <div class="form-group"><label>Nom complet *</label><input type="text" id="name" /></div>
      <div class="form-row">
        <div class="form-group"><label>Rôle</label><input type="text" id="role" /></div>
        <div class="form-group"><label>Spécialité</label><input type="text" id="specialty" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Ville</label><input type="text" id="city" /></div>
        <div class="form-group"><label>Téléphone</label><input type="text" id="phone" /></div>
      </div>
      <div class="form-group"><label>Email</label><input type="email" id="email" /></div>
      <div class="form-row">
        <div class="form-group"><label>Initiales</label><input type="text" id="initials" maxlength="3" /></div>
        <div class="form-group"><label>Couleur</label><input type="color" id="color" /></div>
      </div>
    </div>

    <div class="form-section">
      <h2>À propos</h2>
      <div class="form-group"><label>Biographie</label><textarea id="bio" rows="4"></textarea></div>
      <div class="form-group"><label>Compétences</label><input type="text" id="skills" /></div>
      <div class="form-group"><label>Parcours / Expériences</label><textarea id="parcours" rows="5"></textarea></div>
    </div>

    <div class="form-section">
      <h2>Médias</h2>
      <div class="form-group"><label>Nouvelle photo (laisser vide pour garder l'ancienne)</label><input type="file" id="photo" accept="image/*" /></div>
      <div class="form-group"><label>Nouvelle vidéo</label><input type="file" id="video" accept="video/*" /></div>
      <div class="form-group"><label>Nouvel audio</label><input type="file" id="audio" accept="audio/*" /></div>
    </div>

    <div class="step-actions">
      <button class="btn-save" id="btn-update">💾 Enregistrer les modifications</button>
    </div>
    <p id="message" class="form-message"></p>
  </div>

  <!-- MODAL ALERTE -->
  <div class="confirm-overlay" id="alert-overlay">
    <div class="confirm-box">
      <div class="confirm-icon">⚠️</div>
      <h2 class="confirm-title">Attention</h2>
      <p class="confirm-desc" id="alert-message">Message</p>
      <div class="confirm-actions">
        <button class="btn-confirm-delete" onclick="document.getElementById('alert-overlay').classList.remove('active')">OK</button>
      </div>
    </div>
  </div>

<script>
  var id = new URLSearchParams(window.location.search).get('id');

  fetch('/api/cvs/' + id)
    .then(function(r) { return r.json(); })
    .then(function(cv) {
      document.getElementById('name').value      = cv.name      || '';
      document.getElementById('role').value      = cv.role      || '';
      document.getElementById('specialty').value = cv.specialty || '';
      document.getElementById('city').value      = cv.city      || '';
      document.getElementById('phone').value     = cv.phone     || '';
      document.getElementById('email').value     = cv.email     || '';
      document.getElementById('initials').value  = cv.initials  || '';
      document.getElementById('color').value     = cv.color     || '#c026d3';
      document.getElementById('bio').value       = cv.bio       || '';
      document.getElementById('skills').value    = cv.skills    || '';
      document.getElementById('parcours').value  = cv.parcours  || '';
    });

  document.getElementById('btn-update').addEventListener('click', function() {
    var name = document.getElementById('name').value.trim();
    if (!name) {
      document.getElementById('alert-message').textContent = 'Le nom est obligatoire !';
      document.getElementById('alert-overlay').classList.add('active');
      return;
    }

    var formData = new FormData();
    formData.append('name',      name);
    formData.append('role',      document.getElementById('role').value);
    formData.append('specialty', document.getElementById('specialty').value);
    formData.append('city',      document.getElementById('city').value);
    formData.append('email',     document.getElementById('email').value);
    formData.append('phone',     document.getElementById('phone').value);
    formData.append('bio',       document.getElementById('bio').value);
    formData.append('skills',    document.getElementById('skills').value);
    formData.append('parcours',  document.getElementById('parcours').value);
    formData.append('initials',  document.getElementById('initials').value);
    formData.append('color',     document.getElementById('color').value);

    var photo = document.getElementById('photo').files[0];
    var video = document.getElementById('video').files[0];
    var audio = document.getElementById('audio').files[0];
    if (photo) formData.append('photo', photo);
    if (video) formData.append('video', video);
    if (audio) formData.append('audio', audio);

    var msg = document.getElementById('message');
    msg.textContent = 'Enregistrement...';
    msg.style.color = 'var(--accent)';

    fetch('/api/cvs/' + id, { method: 'PUT', body: formData })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          msg.textContent = '✅ CV modifié avec succès !';
          msg.style.color = '#52c97a';
          setTimeout(function() { window.location.href = '../index.html'; }, 1500);
        } else {
          msg.textContent = '❌ Erreur lors de la modification.';
          msg.style.color = '#e05252';
        }
      });
  });
</script>
</body>
</html>
